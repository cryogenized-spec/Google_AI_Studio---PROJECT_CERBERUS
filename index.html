<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Project_Cerberus // Ysaraith</title>
    
    <!-- PWA & Mobile Meta -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <link rel="apple-touch-icon" href="/icons/icon-512.png" />
    <link rel="icon" type="image/png" href="/icons/icon-512.png" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              cerberus: {
                900: '#1a0505',
                800: '#2d0a0a',
                700: '#4a0e0e',
                600: '#7f1d1d',
                500: '#9b2c2c',
                accent: '#d4af37',
                void: '#0a0a0c',
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Cinzel', 'Playfair Display', 'serif'],
              mono: ['JetBrains Mono', 'monospace'],
              script: ['Pinyon Script', 'cursive'],
              playfair: ['Playfair Display', 'serif'],
            },
          },
        },
      }
    </script>
    <style>
      /* --- CRITICAL BOOT STYLES --- */
      body {
        background-color: #000000;
        margin: 0;
        overflow: hidden;
        user-select: none;
      }

      #root {
        opacity: 1;
        min-height: 100vh;
      }

      #splash-screen {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        z-index: 9999;
        background-color: #000000;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        opacity: 1;
        transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        cursor: pointer;
        touch-action: manipulation;
      }

      #splash-glyph-layer {
        position: relative;
        z-index: 2;
        width: 220px;
        height: 220px;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transition: opacity 1.5s ease-out;
        background: transparent;
      }

      #splash-glyph {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .glyph-fade-in {
        opacity: 1 !important;
      }

      .splash-fade-out {
        opacity: 0 !important;
        pointer-events: none;
      }

      #crash-report {
        position: fixed;
        inset: 0;
        z-index: 10000;
        background: #1a0505;
        color: #fca5a5;
        padding: 40px;
        font-family: monospace;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;500;600&family=Playfair%20Display:ital,wght@0,400;0,600;1,400&family=Pinyon%20Script&display=swap" rel="stylesheet">
    
    <script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.40.0",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react-markdown": "https://esm.sh/react-markdown@^10.1.0",
    "uuid": "https://esm.sh/uuid@^13.0.0",
    "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
    "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js",
    "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
    "firebase/": "https://esm.sh/firebase@^12.9.0/",
    "dexie": "https://esm.sh/dexie@^4.0.1",
    "dexie-react-hooks": "https://esm.sh/dexie-react-hooks@^1.1.1",
    "@fullcalendar/core": "https://esm.sh/@fullcalendar/core@6.1.15",
    "@fullcalendar/react": "https://esm.sh/@fullcalendar/react@6.1.15?deps=react@19.2.4,react-dom@19.2.4",
    "@fullcalendar/daygrid": "https://esm.sh/@fullcalendar/daygrid@6.1.15",
    "@fullcalendar/timegrid": "https://esm.sh/@fullcalendar/timegrid@6.1.15",
    "@fullcalendar/interaction": "https://esm.sh/@fullcalendar/interaction@6.1.15",
    "@fullcalendar/list": "https://esm.sh/@fullcalendar/list@6.1.15"
  }
}
</script>
</head>
  <body class="bg-cerberus-void text-gray-300 font-sans antialiased overflow-hidden">
    
    <!-- BOOT SEAL - Simplified (video intro removed for reliability) -->
    <div id="splash-screen" onclick="window.triggerFastBoot()">
      <div id="splash-glyph-layer">
        <img id="splash-glyph" src="/icons/glyph.png" alt="System Glyph" />
      </div>
    </div>

    <!-- CRASH REPORT UI -->
    <div id="crash-report">
        <h2 style="font-size: 24px; margin-bottom: 20px;">CRITICAL SYSTEM FAILURE</h2>
        <p style="margin-bottom: 20px;">The application failed to mount.</p>
        <pre id="crash-details" style="background: #000; padding: 10px; border: 1px solid #7f1d1d; overflow: auto; max-width: 90%; text-align: left;"></pre>
        <button onclick="localStorage.clear(); window.location.reload();" style="margin-top: 20px; padding: 10px 20px; background: #7f1d1d; color: white; border: none; border-radius: 4px; cursor: pointer;">FACTORY RESET & RELOAD</button>
    </div>

    <div id="root"></div>

    <script>
      (function() {
        const splash = document.getElementById('splash-screen');
        const glyphLayer = document.getElementById('splash-glyph-layer');
        const crashReport = document.getElementById('crash-report');
        const crashDetails = document.getElementById('crash-details');
        
        window.isDismissed = false;
        window.appIsReady = false;

        // GLOBAL ERROR HANDLER
        window.onerror = function(msg, url, line, col, error) {
            console.error("GLOBAL ERROR:", msg, error);
            if (splash) splash.style.display = 'none';
            if (crashReport) {
                crashReport.style.display = 'flex';
                crashDetails.textContent = msg + "\n" + (error ? error.stack : '');
            }
            return false;
        };

        window.onunhandledrejection = function(event) {
            console.error("UNHANDLED PROMISE:", event.reason);
        };

        // React calls this when mounted (now implemented in index.tsx)
        window.signalAppReady = function() {
            console.log("BOOT: React App Mounted / Ready signaled.");
            window.appIsReady = true;
            // Auto-dismiss if not already dismissed
            if (!window.isDismissed && splash) {
                window.finishBootSequence();
            }
        };

        window.finishBootSequence = function() {
            if (window.isDismissed) return;
            window.isDismissed = true;
            if(splash) splash.classList.add('splash-fade-out');
            setTimeout(() => {
                if(splash) splash.style.display = 'none';
                document.body.style.overflow = 'auto';
            }, 850); 
        };

        // User Tap / Skip - now always allows skip
        window.triggerFastBoot = function() {
            console.log("BOOT: User triggered fast boot.");
            window.finishBootSequence();
        };

        // --- SIMPLIFIED SEQUENCE LOGIC (video intro removed) ---
        window.onload = function() {
            // Fade In Glyph immediately
            if (glyphLayer) {
                glyphLayer.classList.add('glyph-fade-in');
            }

            // Auto-dismiss after short cinematic pause (or when React signals ready)
            setTimeout(() => {
                if (!window.isDismissed) {
                    if (window.appIsReady) {
                        window.finishBootSequence();
                    } else {
                        // Wait a bit more for React, or user can tap
                        console.log("BOOT: Waiting for app ready or user tap...");
                    }
                }
            }, 2500); // 2.5s nice intro with glyph

            // Safety: force dismiss after 8s max if still stuck
            setTimeout(() => {
                if (!window.isDismissed) {
                    console.log("BOOT: Safety timeout - forcing entry.");
                    window.finishBootSequence();
                }
            }, 8000);
        };
      })();

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
